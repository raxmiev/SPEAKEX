name: release smoke

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  install:
    runs-on: macos-15
    steps:
      - name: Install from the public command
        run: |
          curl -fsSL https://raw.githubusercontent.com/raxmiev/SPEAKEX/main/install.sh | \
            SPEAKEX_NO_OPEN=1 bash
      - name: Verify installed release
        run: |
          test -x /Applications/SPEAKEX.app/Contents/MacOS/SPEAKEX
          test "$(plutil -extract CFBundleIdentifier raw -o - /Applications/SPEAKEX.app/Contents/Info.plist)" = "com.local.speakex"
          test "$(plutil -extract CFBundleShortVersionString raw -o - /Applications/SPEAKEX.app/Contents/Info.plist)" = "0.2.21"
          file /Applications/SPEAKEX.app/Contents/MacOS/SPEAKEX | grep -q arm64
          codesign --verify --deep --strict /Applications/SPEAKEX.app
          codesign -d --entitlements :- /Applications/SPEAKEX.app > "$RUNNER_TEMP/entitlements.plist" 2>/dev/null
          test "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.security.device.audio-input' "$RUNNER_TEMP/entitlements.plist")" = "true"
          test "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.security.device.microphone' "$RUNNER_TEMP/entitlements.plist")" = "true"
