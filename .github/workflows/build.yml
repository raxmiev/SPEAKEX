name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate scripts and plists
        run: ./scripts/check.sh
      - name: Swift self-tests
        run: swift run -c debug --package-path swift Speakex --self-test all
      - name: Build app bundle
        run: ./scripts/build-app.sh "$RUNNER_TEMP/SPEAKEX.app"
      - name: Verify app bundle
        run: |
          test -x "$RUNNER_TEMP/SPEAKEX.app/Contents/MacOS/SPEAKEX"
          codesign --verify --deep --strict "$RUNNER_TEMP/SPEAKEX.app"
      - name: Exercise installer and uninstaller
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/SPEAKEX.app" "$RUNNER_TEMP/release/SPEAKEX.zip"
          checksum="$(shasum -a 256 "$RUNNER_TEMP/release/SPEAKEX.zip" | awk '{print $1}')"
          SPEAKEX_RELEASE_URL="file://$RUNNER_TEMP/release/SPEAKEX.zip" \
          SPEAKEX_RELEASE_SHA256="$checksum" \
          SPEAKEX_NO_OPEN=1 \
            ./install.sh
          test -x /Applications/SPEAKEX.app/Contents/MacOS/SPEAKEX
          codesign --verify --deep --strict /Applications/SPEAKEX.app
          ./uninstall.sh
          test ! -e /Applications/SPEAKEX.app
